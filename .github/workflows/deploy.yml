name: Kittygram deploy

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  entry:
    name: Check terraform apply
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.verify.outputs.run }}
    steps:
      - name: Verify
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUN_ID="${{ github.event.workflow_run.id }}"
          APPLY=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name=="terraform") | .steps[] | select(.name=="Terraform Apply") | .conclusion' | head -n1)
          if [ "$APPLY" = "success" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  tests:
    name: Run tests and linters
    runs-on: ubuntu-latest
    needs: entry
    if: needs.entry.outputs.run == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0 pytest pyyaml
          pip install -r ./backend/requirements.txt

      - name: Test with flake8
        run: python -m flake8 backend/

 
  build_and_push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend/
          - name: frontend
            context: ./frontend/
          - name: gateway
            context: ./nginx/

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_${{ matrix.service.name }}:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - build_and_push
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: server-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Read VM IP
        id: read-ip
        run: echo "VM_IP=$(cat vm-ip.txt | xargs)" >> $GITHUB_OUTPUT
      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ steps.read_ip.outputs.VM_IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.production.yml
          target: "kittygram"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.read_ip.outputs.VM_IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd kittygram
            cat <<EOF > .env
            ${{ secrets.DOT_ENV }}
            EOF
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            sudo docker compose -f docker-compose.production.yml pull
            sudo docker compose -f docker-compose.production.yml up -d --remove-orphans
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --no-input
            
  auto_tests:
    name: Run autotests after deploy
    runs-on: ubuntu-latest
    needs: deploy 
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: server-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Read VM IP
        id: read-ip
        run: echo "VM_IP=$(cat vm-ip.txt | xargs)" >> $GITHUB_OUTPUT
      - name: Create tests.yml
        run: |
          cat <<EOF > tests.yml
          repo_owner: ${{ github.repository_owner }}
          kittygram_domain: http://${{ steps.read-ip.outputs.VM_IP }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          EOF

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest pyyaml

      - name: Run project structure tests
        env:
            SECRET_KEY: "dummy-secret-key-for-testing"
        run: pytest

  telegram-notify:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    needs: auto_tests
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: server-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Read VM IP
        id: read-ip
        run: echo "VM_IP=$(cat vm-ip.txt | xargs)" >> $GITHUB_OUTPUT
      - name: Send success message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Деплой Kittygram успешно завершен
            
            Пользователь: ${{ github.actor }}
            Коммит: ${{ github.sha }}
            
            Проект доступен по адресу:
            http://${{ steps.read_ip.outputs.VM_IP }}